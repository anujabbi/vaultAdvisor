appId: com.anujabbi.vaultadvisor
productName: VaultAdvisor
directories:
  output: dist
files:
  - out/**
  - package.json
asarUnpack:
  - node_modules/better-sqlite3/**
  - node_modules/@anthropic-ai/claude-agent-sdk*/**
win:
  target:
    - nsis
  artifactName: VaultAdvisor-Setup-${version}.exe
  extraResources:
    - from: node_modules/@anthropic-ai/claude-agent-sdk-win32-x64/claude.exe
      to: claude/claude.exe
nsis:
  oneClick: true
  deleteAppDataOnUninstall: false
mac:
  target:
    - dmg
  category: public.app-category.finance
  artifactName: VaultAdvisor-${version}.dmg
  extraResources:
    - from: node_modules/@anthropic-ai/claude-agent-sdk-darwin-${arch}/claude
      to: claude/claude
publish: null
